<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ammonia Plant — Why We Do Each Step</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f4ef;
  --bg2:#edeae3;
  --bg3:#e3dfd6;
  --card:#ffffff;
  --ink:#1a1510;
  --ink2:#5a5248;
  --ink3:#9a9088;
  --rule:#d8d3ca;
  --a-green:#1a6b4a;
  --a-green-bg:#e8f5ef;
  --a-blue:#1a3f7a;
  --a-blue-bg:#e8edf8;
  --a-amber:#7a4a0a;
  --a-amber-bg:#fef3e2;
  --a-red:#7a1a1a;
  --a-red-bg:#fde8e8;
  --a-purple:#3d1a7a;
  --a-purple-bg:#eeebfb;
  --accent:#c84b00;
  --sans:'Instrument Sans',sans-serif;
  --display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh}

/* ─ HEADER ─ */
.site-header{
  background:var(--ink);
  padding:18px 32px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.site-logo{font-family:var(--display);font-size:14px;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase}
.site-logo span{color:var(--accent)}
.prog-wrap{display:flex;align-items:center;gap:12px}
.prog-track{width:140px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px}
.prog-fill{height:3px;background:var(--accent);border-radius:2px;transition:width .4s ease}
.prog-txt{font-family:var(--display);font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px}

/* ─ STEP PILLS NAV ─ */
.pills-nav{
  background:var(--bg2);border-bottom:1px solid var(--rule);
  display:flex;overflow-x:auto;gap:0;padding:0 24px;
  scrollbar-width:none;
}
.pills-nav::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  padding:10px 14px;border:none;background:none;cursor:pointer;
  font-family:var(--display);font-size:11px;font-weight:600;
  color:var(--ink3);letter-spacing:.5px;text-transform:uppercase;
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;
}
.pill:hover{color:var(--ink2)}
.pill.active{color:var(--accent);border-bottom-color:var(--accent)}
.pill.done{color:var(--ink2)}
.pill-num{
  width:20px;height:20px;border-radius:50%;
  background:var(--bg3);color:var(--ink3);
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.pill.active .pill-num{background:var(--accent);color:#fff}
.pill.done .pill-num{background:var(--a-green);color:#fff}

/* ─ LAYOUT ─ */
.layout{display:grid;grid-template-columns:1fr 360px;min-height:calc(100vh - 130px)}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

/* ─ MAIN CONTENT ─ */
.main{padding:36px 40px;border-right:1px solid var(--rule)}

.step-eyebrow{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.section-chip{
  font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;padding:4px 12px;border-radius:20px;
}
.step-counter{font-family:var(--display);font-size:11px;color:var(--ink3);letter-spacing:.5px}
.step-title{font-family:var(--display);font-size:32px;font-weight:800;line-height:1.15;color:var(--ink);margin-bottom:10px}
.step-hook{font-size:16px;color:var(--ink2);line-height:1.65;margin-bottom:32px;font-style:italic;border-left:3px solid var(--accent);padding-left:16px}

/* ─ WHY CARDS (the main new feature) ─ */
.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px}
@media(max-width:700px){.why-grid{grid-template-columns:1fr}}
.why-card{
  border-radius:8px;padding:18px 20px;
  border:1px solid;
  position:relative;overflow:hidden;
}
.why-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:currentColor;opacity:.4;
}
.why-card-icon{font-size:22px;margin-bottom:10px;display:block}
.why-card-label{
  font-family:var(--display);font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;
}
.why-card-title{font-size:15px;font-weight:500;margin-bottom:8px;line-height:1.3}
.why-card-body{font-size:13px;line-height:1.65;color:inherit;opacity:.85}

.why-card.green{background:var(--a-green-bg);color:var(--a-green);border-color:rgba(26,107,74,.2)}
.why-card.blue{background:var(--a-blue-bg);color:var(--a-blue);border-color:rgba(26,63,122,.2)}
.why-card.amber{background:var(--a-amber-bg);color:var(--a-amber);border-color:rgba(122,74,10,.2)}
.why-card.red{background:var(--a-red-bg);color:var(--a-red);border-color:rgba(122,26,26,.2)}
.why-card.purple{background:var(--a-purple-bg);color:var(--a-purple);border-color:rgba(61,26,122,.2)}

/* ─ EQUIPMENT RATIONALE TABLE ─ */
.section-label{
  font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--ink3);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--rule)}

.equip-rationale{margin-bottom:32px}
.equip-row{
  border:1px solid var(--rule);border-radius:8px;margin-bottom:10px;overflow:hidden;
  background:var(--card);
}
.equip-header{
  display:grid;grid-template-columns:100px 1fr;
  background:var(--bg2);border-bottom:1px solid var(--rule);
}
.equip-tag-big{
  font-family:var(--display);font-size:13px;font-weight:800;
  padding:12px 16px;color:var(--accent);letter-spacing:.5px;
  border-right:1px solid var(--rule);display:flex;align-items:center;
}
.equip-name{
  font-family:var(--display);font-size:13px;font-weight:600;
  padding:12px 16px;color:var(--ink);display:flex;align-items:center;
}
.equip-body{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.equip-body{grid-template-columns:1fr}}
.equip-section-title{
  font-family:var(--display);font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;
}
.equip-text{font-size:13px;line-height:1.65;color:var(--ink2)}

/* ─ PROCESS LOGIC CHAIN ─ */
.logic-chain{margin-bottom:32px}
.logic-step{
  display:flex;gap:14px;margin-bottom:0;
  position:relative;
}
.logic-step:not(:last-child)::after{
  content:'';position:absolute;left:15px;top:34px;bottom:-8px;width:2px;
  background:var(--rule);z-index:0;
}
.logic-num{
  width:32px;height:32px;border-radius:50%;
  background:var(--ink);color:#fff;
  font-family:var(--display);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;z-index:1;position:relative;margin-top:2px;
}
.logic-content{padding-bottom:20px;flex:1}
.logic-title{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px;line-height:1.3}
.logic-desc{font-size:13px;color:var(--ink2);line-height:1.6}
.logic-consequence{
  display:inline-block;margin-top:6px;
  font-size:12px;padding:3px 10px;border-radius:4px;
  background:var(--a-amber-bg);color:var(--a-amber);
  font-weight:500;
}

/* ─ CONSEQUENCE BOX ─ */
.consequence-box{
  border:1px solid rgba(200,75,0,.3);background:rgba(200,75,0,.05);
  border-radius:8px;padding:16px 18px;margin-bottom:32px;
}
.consequence-box .cb-title{
  font-family:var(--display);font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;
}
.consequence-box .cb-body{font-size:13px;line-height:1.7;color:var(--ink2)}

/* ─ SVG DIAGRAM ─ */
.diagram-wrap{
  background:var(--ink);border-radius:10px;padding:20px;
  margin-bottom:32px;overflow:hidden;
}
.diagram-wrap svg{width:100%;display:block}

/* ─ SIDEBAR ─ */
.sidebar{background:var(--bg2);padding:28px 24px;border-left:1px solid var(--rule);overflow-y:auto}
.sidebar-section{margin-bottom:28px}
.sb-heading{
  font-family:var(--display);font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--ink3);
  padding-bottom:8px;border-bottom:1px solid var(--rule);margin-bottom:12px;
}

/* Spec cards */
.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.spec-card{background:var(--card);border:1px solid var(--rule);border-radius:6px;padding:12px}
.spec-val{font-family:var(--display);font-size:16px;font-weight:700;color:var(--ink)}
.spec-unit{font-size:11px;color:var(--ink3);font-weight:400}
.spec-lbl{font-size:11px;color:var(--ink3);margin-top:3px;line-height:1.3}

/* Condition tags */
.cond-list{display:flex;flex-wrap:wrap;gap:6px}
.cond{
  font-family:var(--display);font-size:11px;font-weight:600;
  padding:4px 10px;border-radius:4px;border:1px solid;letter-spacing:.3px;
}
.cond-g{background:var(--a-green-bg);color:var(--a-green);border-color:rgba(26,107,74,.25)}
.cond-b{background:var(--a-blue-bg);color:var(--a-blue);border-color:rgba(26,63,122,.25)}
.cond-a{background:var(--a-amber-bg);color:var(--a-amber);border-color:rgba(122,74,10,.25)}
.cond-r{background:var(--a-red-bg);color:var(--a-red);border-color:rgba(122,26,26,.25)}
.cond-n{background:var(--bg3);color:var(--ink2);border-color:var(--rule)}

/* If-not box */
.if-not{
  background:var(--a-red-bg);border:1px solid rgba(122,26,26,.2);border-radius:6px;
  padding:12px 14px;
}
.if-not-title{font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--a-red);margin-bottom:6px}
.if-not-item{font-size:12px;color:var(--a-red);line-height:1.65;padding-left:12px;position:relative}
.if-not-item::before{content:'→';position:absolute;left:0;color:var(--a-red)}

/* Alternative box */
.alt-box{
  background:var(--a-blue-bg);border:1px solid rgba(26,63,122,.2);border-radius:6px;
  padding:12px 14px;margin-top:10px;
}
.alt-box-title{font-family:var(--display);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--a-blue);margin-bottom:6px}
.alt-box-text{font-size:12px;color:var(--a-blue);line-height:1.65}

/* ─ BOTTOM NAV ─ */
.bottom-nav{
  background:var(--ink);padding:16px 40px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;bottom:0;z-index:100;
}
.nav-btn{
  font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;padding:10px 24px;border-radius:4px;
  cursor:pointer;border:1px solid rgba(255,255,255,.2);
  background:transparent;color:rgba(255,255,255,.6);transition:all .15s;
}
.nav-btn:hover:not(:disabled){color:#fff;border-color:rgba(255,255,255,.5)}
.nav-btn:disabled{opacity:.2;cursor:not-allowed}
.nav-btn.next{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-btn.next:hover:not(:disabled){background:#a33a00}
.nav-center{text-align:center}
.nav-step{font-family:var(--display);font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:3px}
.nav-next-title{font-size:13px;color:rgba(255,255,255,.7);max-width:200px}

@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.animate{animation:slideIn .35s ease forwards}
</style>
</head>

    {c:"blue",icon:"🔬",label:"Why two stages",title:"One stage cannot achieve 0.05 ppm",body:"Stage 1 (hydrogenation) converts organic sulphur species — which ZnO cannot absorb — into H₂S. Stage 2 (ZnO) then removes H₂S irreversibly. You cannot skip Stage 1 because ZnO cannot absorb mercaptans, disulphides, or thiophenes directly."},
    {c:"amber",icon:"🌡",label:"Why 380°C specifically",title:"The narrow optimal window for Ni-Mo catalyst",body:"Below 380°C, the hydrogenation of thiophenes is incomplete. Above 400°C, thermal polymerization occurs, depositing carbon-like polymers on the catalyst surface. 380°C is the engineered sweet spot that achieves full conversion without side reactions."},

    {n:"4",title:"ZnO operates at 350–400°C without steam",desc:"Why? ZnO must not be steamed. Steam hydrates ZnO to Zn(OH)₂, which is catalytically useless and cannot be converted back. The catalyst must be kept dry at all times.",consequence:"Steam contact = ZnO hydration = permanent loss of absorption capacity"}

{
  sec:"A",secLabel:"Feed Preparation",secColor:"#1a6b4a",secBg:"#e8f5ef",
  title:"Adiabatic Prereforming",
  hook:"Naphtha is a mixture of heavy hydrocarbons that would violently coke the primary reformer catalyst within minutes if fed directly. The prereformer is a controlled pre-digestion stage — it converts everything heavier than methane into methane first, presenting a uniform, safe feed to the main reformer.",
  whyCards:[
    {c:"green",icon:"⚗",label:"Why this step exists",title:"Heavy hydrocarbons destroy reformer catalyst instantly",body:"C₂₊ hydrocarbons (ethane, propane, naphthalenes) reform much faster than methane on Ni catalyst. At 800°C they crack so fast at the top of the reformer tubes that they deposit solid carbon before the steam can reform them — physically fragmenting the catalyst and blocking tubes within hours."},
    {c:"blue",icon:"♻",label:"Why adiabatic (no heating)",title:"The reactions are self-balancing in energy",body:"C₂₊ steam reforming (endothermic) and methanation (exothermic) happen simultaneously in R3206. The net heat effect is nearly zero, so no external heating or cooling is needed — a simpler, more reliable vessel. The temperature barely changes from inlet to outlet."},
    {c:"amber",icon:"🔄",label:"Why bypass for NG-only",title:"Methane does not coke at reformer inlet conditions",body:"Pure methane is stable at 490°C and steam/carbon = 3.3. It reforms gradually from top to bottom of the primary reformer tubes without any risk of coking. The prereformer adds no benefit and just adds pressure drop — so it is bypassed."},
    {c:"purple",icon:"⚙",label:"Why RKNGR-7H catalyst",title:"Designed for low-temperature reforming of heavy feeds",body:"Standard reforming catalysts (like R-67-7H in H3201) need temperatures above 700°C to be active. RKNGR-7H is a specially promoted nickel catalyst that activates at 490°C — low enough for the adiabatic prereformer inlet temperature while still achieving complete C₂₊ conversion."}
  ],
  logic:[
    {n:"1",title:"Feed is mixed with process steam (W/C = 3.3) before entry",desc:"Why? Steam suppresses carbon formation thermodynamically. At W/C ratios below 2.5 with C₂₊ present, the Boudouard reaction (2CO → CO₂ + C) becomes favourable. Keeping W/C ≥ 3.3 shifts equilibrium away from carbon deposition.",consequence:"W/C < 2.5 = carbon formation on catalyst = pressure drop rise"},
    {n:"2",title:"Feed is preheated to exactly 490°C in E3201",desc:"Why? RKNGR-7H catalyst needs a minimum of ~450°C to be active. 490°C ensures complete C₂₊ conversion in a reasonably sized reactor. Going higher would require a fired heater (capital cost + complexity) rather than the waste-heat coil E3201.",consequence:"Below 450°C = incomplete C₂₊ conversion = heavy HCs enter H3201"},
    {n:"3",title:"Two catalyst beds (2350 mm + 1450 mm) are used",desc:"Why? The first bed handles the bulk of the exothermic C₂₊ cracking. Temperature can rise or fall slightly. The second bed provides residence time for final equilibrium and any remaining C₂₊ traces.",consequence:"Single thin bed = incomplete conversion, especially for aromatics"},
    {n:"4",title:"R3206 outlet goes directly to H3201 without cooling",desc:"Why? The prereformer outlet is at exactly the right temperature for the primary reformer inlet (~490°C). Cooling it would waste energy and require reheating. The entire system is thermally integrated.",consequence:"Unnecessary cooling = wasted heat + additional equipment cost"}
  ],
  equipment:[
    {tag:"E3201",name:"Feed preheater coil",why:"Located in the primary reformer convection section (waste-heat zone), E3201 uses free flue gas energy to heat the mixed feed/steam stream to 490°C. No separate fired heater is needed — the primary reformer's own flue gas does the work.",altWhy:"Without E3201, a separate fired preheater would be required, adding capital cost and fuel consumption. The integrated heat recovery design is what makes the process thermally efficient."},
    {tag:"R3206",name:"Adiabatic Prereformer",why:"This reactor provides a controlled environment where heavy hydrocarbons react with steam at moderate temperature (490°C) over RKNGR-7H catalyst. Adiabatic design is chosen specifically because the net heat of reaction is near-zero — no external heat supply or removal is needed, simplifying construction enormously.",altWhy:"Without R3206 when using naphtha feed, all C₂₊ hydrocarbons would enter H3201 and reform at the very top of the catalyst tubes at 800°C, depositing carbon filaments that physically break catalyst pellets apart within hours."}
  ],
  consequence:"Skipping R3206 with naphtha feed would cause the primary reformer to coke within a shift (8–12 hours). Tube pressure drop would rise, hot bands would appear, and tubes could fail structurally. For NG-only operation, bypassing R3206 is correct and expected — no consequence.",
  specs:[{v:"23.4",u:"m³",l:"RKNGR-7H catalyst"},{v:"490",u:"°C",l:"Inlet temperature"},{v:"2350",u:"mm",l:"1st bed height"},{v:"1450",u:"mm",l:"2nd bed height"},{v:"3.3",u:"W/C",l:"Min steam ratio"},{v:"Bypass",u:"",l:"NG-only mode"}],

{
  sec:"B",secLabel:"Reaction",secColor:"#1a3f7a",secBg:"#e8edf8",
  title:"Primary Reforming",
  hook:"This is the hydrogen factory at the core of the ammonia plant. Natural gas and steam are passed through 288 catalyst tubes inside a giant furnace — the chemistry is simple, but the engineering to make it work reliably at 800°C and 34 kg/cm²g is extraordinary.",
  whyCards:[
    {c:"blue",icon:"🔥",label:"Why a fired tubular furnace",title:"The reaction is endothermic — it needs constant heat input",body:"Steam reforming absorbs ~206 kJ per mole of CH₄ converted. This heat cannot come from internal combustion (would make a reducing gas environment) — it must be supplied externally through the tube walls. A radiant-box furnace with wall burners achieves the required heat flux across all 288 tubes simultaneously."},
    {c:"green",icon:"📏",label:"Why 288 separate tubes",title:"Heat transfer area and pressure limitations",body:"One big reactor vessel cannot achieve the necessary heat flux to the catalyst. Hundreds of narrow tubes (each ~100mm internal diameter) provide an enormous surface-to-volume ratio for heat transfer. The tube walls also contain the 34 kg/cm²g pressure at 800°C — thicker single vessels would be impractical."},
    {c:"amber",icon:"⚖",label:"Why leave 10–11% CH₄ unconverted",title:"Complete conversion would overheat and destroy tubes",body:"Pushing conversion to 100% would require either higher temperature (tubes fail by creep above ~900°C metal temperature) or lower pressure (losing compression energy). 10–11% residual CH₄ at 800°C is the economically optimal balance — the remaining methane is handled as an inert in the loop."},
    {c:"red",icon:"💧",label:"Why W/C = 3.3 (excess steam)",title:"Steam prevents carbon formation on catalyst",body:"At W/C below ~2.5, the Boudouard reaction (2CO→CO₂+C) and methane cracking (CH₄→C+2H₂) become thermodynamically favourable. W/C = 3.3 keeps the equilibrium firmly in the carbon-free zone. Excess steam also shifts reforming equilibrium toward more H₂ production."}
  ],
  logic:[
    {n:"1",title:"Feed enters at 485–490°C, exits at 800°C",desc:"Why? The catalyst (R-67-7H) needs ~700°C to achieve meaningful methane conversion rates. The inlet is limited by the practical temperature of heat sources in the flue gas waste-heat zone. The 485–800°C gradient across the tube length is the direct result of the endothermic reaction consuming heat as it proceeds.",consequence:"Inlet below 450°C = no conversion in top section = shorter effective tube length"},
    {n:"2",title:"Wall burners use 5% excess air",desc:"Why? Less than stoichiometric air = incomplete combustion = CO in flue gas = safety and efficiency loss. 5% excess ensures complete combustion while keeping the excess O₂ low (0.9% in flue gas). Higher excess air would waste fuel heating unused nitrogen.",consequence:"Excess air <2% = risk of incomplete combustion, CO in flue gas"},
    {n:"3",title:"Flue gas WHR coils placed in convection section",desc:"Why? Flue gas exits the radiant box at ~1000°C. Exhausting it to atmosphere would waste enormous energy. The convection section recovers this heat to preheat the NG feed (E3204), feed/steam mixture (E3201), and generate/superheat process steam — dramatically improving thermal efficiency.",consequence:"No WHR = stack temperature ~1000°C = massive fuel waste + high CO₂ emissions"},
    {n:"4",title:"Pre-reduced R-67-7H catalyst is loaded (not oxidised)",desc:"Why? Ni catalyst must be in metallic form to be active. Pre-reduced catalyst is stabilised with a thin superficial oxide layer for safe transport. During initial startup, this oxide layer is reduced with hydrogen before the plant takes feed — shortening the startup procedure.",consequence:"Loading fully oxidised catalyst = longer startup reduction time = days of delay"}
  ],
  equipment:[
    {tag:"H3201",name:"Primary Reformer (fired box)",why:"The radiant-box design with wall burners is chosen because it provides the most uniform heat distribution across all 288 tube rows. Side-fired (wall-burner) reformers give better tube-to-tube heat distribution than top-fired designs — critical for avoiding local hot spots that cause tube creep failure.",altWhy:"Without H3201, there is no hydrogen production. All other process steps depend on the reformed gas from this unit. It is the single largest item in the plant — typically consuming 50–60% of total plant fuel energy."},
    {tag:"E3204/E3201",name:"WHR preheater coils",why:"Both coils are physically located inside the primary reformer convection section — the zone where hot flue gas flows before exiting the stack. Placing feed preheaters here recovers flue gas heat for free, reducing the fuel needed to heat the feed separately.",altWhy:"Without these coils, feed gas would enter the reformer at 20–30°C instead of 480–490°C. The reformer would need to consume 15–20% more fuel just to heat the cold feed, dramatically increasing operating cost."}
  ],
  consequence:"The primary reformer is the heart of hydrogen production. Without it, there is no synthesis gas, no ammonia, no product. Any significant failure (tube leak, catalyst coking, burner trip) stops the entire plant. It is the most critical and most monitored piece of equipment in the facility.",
  specs:[{v:"288",u:"tubes",l:"Catalyst tube count"},{v:"800",u:"°C",l:"Outlet temperature"},{v:"42.8",u:"m³",l:"R-67-7H catalyst"},{v:"34",u:"kg/cm²g",l:"Operating pressure"},{v:"3.3",u:"W/C",l:"Steam/carbon ratio"},{v:"10–11",u:"%",l:"CH₄ at outlet (dry)"}],
  conds:[{t:"Tin 485–490°C",c:"a"},{t:"Tout 800°C",c:"r"},{t:"34 kg/cm²g",c:"n"},{t:"W/C = 3.3",c:"g"},{t:"5% excess air",c:"n"},{t:"R-67-7H Ni pre-reduced",c:"b"}],
  ifNot:["Sulphur entry → NiS forms → catalyst deactivation within hours","W/C drop <2.5 → carbon on catalyst → tube hot bands → structural failure","Tube overheating >850°C metal T → creep failure → tube leak → emergency shutdown"],

{
  sec:"B",secLabel:"Reaction",secColor:"#1a3f7a",secBg:"#e8edf8",
  title:"Secondary Reforming",
  hook:"This reactor does two completely different jobs at the same time: it finishes converting the last 10% of methane, AND it injects exactly the right amount of nitrogen for ammonia synthesis. Get the air flow wrong by even 1% and the entire downstream H₂/N₂ ratio is off — and there is no correction possible downstream.",
  whyCards:[
    {c:"red",icon:"💨",label:"Why inject air (not pure N₂)",title:"Oxygen drives the heat needed to complete reforming",body:"Pure N₂ would be inert — it could introduce nitrogen but cannot generate the 1100–1200°C needed to reform the last 10% of methane. The oxygen in air combusts part of the H₂ and CH₄, releasing intense heat that drives the endothermic reforming of residual methane. The O₂ is sacrificed to create the thermal energy."},
    {c:"blue",icon:"⚖",label:"Why the air quantity is exactly fixed",title:"H₂/N₂ = 3.0 is stoichiometrically non-negotiable",body:"The synthesis reaction requires exactly 3 moles of H₂ per mole of N₂. Since all the N₂ in the plant comes from this air injection, the air flow must be precisely set so the N₂ in the process air equals exactly 1/4 of the H₂ in the purified gas. There is no later step to add or remove N₂."},
    {c:"amber",icon:"🌡",label:"Why 1100–1200°C in the combustion zone",title:"This temperature is needed to reform methane completely",body:"Methane conversion equilibrium strongly favours completion above 1000°C. By burning H₂ and CH₄ to reach 1100–1200°C in the combustion zone, the gas then enters the RKS-2-7H catalyst bed at high enough temperature to drive residual methane conversion down to 0.30% — 30× lower than the primary reformer outlet."},
    {c:"purple",icon:"❄",label:"Why rapid cooling in E3206 WHB",title:"The Boudouard reaction deposits carbon at 650–776°C",body:"At this temperature window, 2CO → CO₂ + C becomes spontaneous. The gas must pass through this range as quickly as possible. E3206 is designed for an extremely high heat flux — it cools the 990°C gas through the danger zone in seconds, not minutes. The payoff is also HP steam generation."}
  ],
  logic:[
    {n:"1",title:"Oxygen fully consumed in upper combustion zone",desc:"Why? Any residual O₂ below the combustion zone would oxidise the RKS-2-7H catalyst — converting the active nickel to nickel oxide, permanently deactivating it. The burner design ensures complete O₂ combustion before the gas contacts the catalyst bed.",consequence:"Residual O₂ to catalyst = NiO formation = catalyst deactivation"},
    {n:"2",title:"Combustion temperature limited to <1400°C",desc:"Why? RKS-2-7H catalyst sinters above 1400°C. Sintering fuses the nickel crystallites together, dramatically shrinking the active surface area. Once sintered, activity cannot be recovered — the catalyst must be replaced.",consequence:"T > 1400°C = catalyst sintering = permanent activity loss = unplanned change"},
    {n:"3",title:"CH₄ outlet controlled to 0.30% by adjusting primary reformer firing",desc:"Why? The secondary reformer has no independent temperature control — its outlet depends on the inlet composition from H3201. Operators adjust the primary reformer's firing rate (more or less fuel) to change the CH₄ entering R3203, which shifts the outlet CH₄.",consequence:"CH₄ outlet >1% = higher inert load in synthesis loop = lower conversion"},
    {n:"4",title:"E3206 WHB cools gas immediately at reactor exit",desc:"Why? 990°C gas in long pipework would slowly deposit carbon via the Boudouard reaction. The WHB is the first piece of equipment after R3203, minimising residence time at high temperature. The rapid cooling through 776–650°C prevents any carbon deposition.",consequence:"Slow cooling = Boudouard carbon deposition in downstream pipework"}
  ],
  equipment:[
    {tag:"R3203",name:"Secondary Reformer",why:"Refractory-lined vessel design is necessary because no metal alloy can tolerate 1100–1200°C. The refractory lining (typically alumina-based) protects the vessel shell from the extreme combustion temperatures. The separate combustion zone above the catalyst bed ensures O₂ is fully consumed before contacting nickel catalyst.",altWhy:"Without R3203: (1) the 10% residual CH₄ would remain as inert in the synthesis loop, requiring a much larger purge and losing synthesis gas value; (2) there would be no source of N₂ for the synthesis — the entire ammonia synthesis would be impossible."},
    {tag:"E3206",name:"Secondary reformer WHB",why:"Placed immediately at the reactor outlet to prevent carbon deposition from the Boudouard reaction. The high heat flux design (deliberately oversized for rapid quench) drops the gas from 990°C to below 600°C within seconds. The energy recovered generates HP steam — one of the plant's most valuable utility products.",altWhy:"Without E3206, the 990°C gas would slowly cool in pipework. The Boudouard temperature window (650–776°C) would be traversed slowly, depositing carbon on pipe walls, valves, and the HT shift catalyst — causing progressively increasing pressure drop and eventual blockage."}
  ],
  consequence:"This step cannot be skipped. Without secondary reforming: no nitrogen in the synthesis gas, no ammonia synthesis possible. Incorrect air flow permanently sets the wrong H₂/N₂ ratio for the entire plant — there is no correction available downstream. It is the most consequential single control point in the process.",
  specs:[{v:"39",u:"m³",l:"RKS-2-7H catalyst"},{v:"990",u:"°C",l:"Reactor outlet T"},{v:"0.30",u:"%",l:"CH₄ at outlet (dry)"},{v:"1100–1200",u:"°C",l:"Combustion zone"},{v:"13%/7.3%",u:"",l:"CO/CO₂ at outlet"},{v:"<1400",u:"°C",l:"Sintering limit"}],
  conds:[{t:"1100–1200°C combustion",c:"r"},{t:"Tout = 990°C",c:"r"},{t:"CH₄ out 0.30%",c:"g"},{t:"N₂ from air",c:"b"},{t:"RKS-2-7H",c:"n"},{t:"Rapid WHB quench",c:"a"}],
  ifNot:["Wrong air flow → wrong H₂/N₂ → no correction downstream → off-spec or no ammonia","Residual O₂ to catalyst → nickel oxide → deactivation","Slow post-reactor cooling → Boudouard carbon → pressure drop rise"],
  svgH:240,
  svg:`<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

{
  sec:"B",secLabel:"Reaction",secColor:"#1a3f7a",secBg:"#e8edf8",
  title:"CO Shift Conversion",
  hook:"We have just created a gas with 13% carbon monoxide — but we want hydrogen. The shift reaction converts that CO into more H₂ plus CO₂, which is easy to remove. The challenge: the reaction obeys opposite temperature laws for equilibrium and rate, forcing a two-stage design.",
  whyCards:[
    {c:"green",icon:"⬆",label:"Why convert CO to H₂",title:"CO is lost hydrogen — and a serious downstream poison",body:"Every mole of CO in the reformed gas represents 3 moles of H₂ that could be made from it. If left as CO, it would: (1) be lost as CO₂ after the absorber, (2) permanently poison the LT shift Cu catalyst if any reaches it unreacted, (3) catastrophically poison the ammonia synthesis catalyst if it reaches the converter."},
    {c:"blue",icon:"🔄",label:"Why two stages (HT then LT)",title:"Thermodynamic dilemma: rate vs equilibrium",body:"The shift reaction is exothermic. Lower temperature → higher equilibrium conversion. But lower temperature → much slower rate (needs more catalyst or bigger vessel). HT stage uses 350–440°C for speed, accepting limited conversion (13%→4%). LT stage uses 200–230°C for high conversion (4%→0.3%), accepting slower rate with more catalyst."},
    {c:"amber",icon:"🛡",label:"Why chlorine guard layer on LT converter",title:"Chloride salts destroy the Cu/Zn catalyst rapidly",body:"Steam lines can contain trace NaCl and other salts from boiler water treatment. These pass as vapour into the process gas and would permanently poison the Cu/Zn catalyst. A 6.1 m³ sacrificial LSK chloride-guard layer at the top of the LT converter absorbs all chlorides before they reach the valuable catalyst below."},
    {c:"red",icon:"🚨",label:"Why bypass LT during plant startup",title:"Sulphur from upstream equipment poisons Cu/Zn fatally",body:"During initial startup, sulphur leaches from the secondary reformer brick lining, the HT shift catalyst itself, and piping into the process gas. Cu/Zn catalyst deactivates permanently at just 0.2 wt% sulphur pickup. The LT bypass remains open until online gas analysers confirm sulphur is below 0.1 ppm."}
  ],
  logic:[
    {n:"1",title:"HT converter R3204 operates at 350–440°C (not higher)",desc:"Why? Above 470°C the iron oxide catalyst begins to over-reduce to Fe₃O₄, losing its chromium promoter and deactivating. The 350–440°C operating window is the regime where the catalyst is stable, active, and achieves reasonable (but not maximum) shift conversion.",consequence:"T > 470°C = iron catalyst over-reduction = rapid activity loss"},
    {n:"2",title:"Gas is cooled between HT and LT stages",desc:"Why? The HT stage outlet is at 420–440°C. The LT catalyst (Cu/Zn) has a maximum operating temperature of 270°C — entering at 440°C would destroy it. Interstage cooling is therefore mandatory, not optional.",consequence:"No interstage cooling = LT converter inlet too hot = sintering of Cu/Zn catalyst"},
    {n:"3",title:"LT converter R3205 uses separate chlorine guard",desc:"Why? The LSK chlorine guard layer is a cheaper, expendable catalyst that sacrificially absorbs chlorides. When it is spent, only the top layer needs replacement — not the entire 122 m³ bed. This protects the expensive main catalyst layer.",consequence:"No guard layer = chlorides to main LK-801-S = rapid permanent deactivation"},
    {n:"4",title:"LT catalyst is activated at 150–200°C with dilute H₂",desc:"Why? CuO must be reduced to active metallic Cu before operation. At 200°C, the reduction is controlled and generates manageable heat (CuO + H₂ → Cu + H₂O). Reducing at higher temperature or with concentrated H₂ causes runaway temperature in the bed.",consequence:"Reduction too fast = bed temperature spike = Cu sintering = catalyst loss before first use"}
  ],
  equipment:[
    {tag:"R3204",name:"HT Shift Converter",why:"Iron/chromium oxide catalyst is chosen for the HT stage because it is thermally stable at 350–470°C, tolerates the high sulphur levels present before sulphur guard can fully protect (HDS is never perfect), and is robust against steam. Fe/Cr catalysts have operated for decades in this service without major surprises.",altWhy:"Without R3204, the gas would enter the LT converter at 13% CO. The LT Cu/Zn catalyst would immediately heat up by 13 × 75°C = ~1000°C above inlet — instantly destroying it by sintering. The HT stage is the mandatory first step to bring CO down to a manageable 4%."},
    {tag:"R3205",name:"LT Shift Converter",why:"Cu/Zn/Al₂O₃ catalyst operates at 200–250°C, exactly the temperature range where shift equilibrium is highly favourable. At 210°C, the equilibrium CO concentration is below 0.3% — it would take a much higher temperature for Fe/Cr catalyst to achieve the same result. The Cu/Zn catalyst is thus the only practical choice for deep CO conversion.",altWhy:"Without R3205, the process gas would enter the CO₂ absorber with ~4% CO. After CO₂ removal, 4% CO would reach the methanator — far exceeding its 420°C temperature limit (4% × 75°C/mol% = +300°C rise) and destroying it within hours."}
  ],
  consequence:"Incomplete shift conversion has cascading consequences. High CO in the methanator causes temperature excursion and catalyst damage. CO slipping to the synthesis converter permanently poisons the KMIR iron catalyst — the most expensive catalyst in the plant. Both CO and CO₂ must be below 10 ppm when synthesis gas enters the converter.",
  specs:[{v:"92.28",u:"m³",l:"R3204 SK201-2"},{v:"122",u:"m³",l:"R3205 LK-801-S"},{v:"13%→4%",u:"",l:"CO in HT stage"},{v:"4%→0.3%",u:"",l:"CO in LT stage"},{v:"200–230",u:"°C",l:"LT operating T"},{v:"6.1",u:"m³",l:"Cl-guard layer"}],
  conds:[{t:"HT: SK201-2 Fe/Cr",c:"a"},{t:"LT: LK-801-S Cu/Zn",c:"b"},{t:"350–440°C (HT)",c:"a"},{t:"200–230°C (LT)",c:"b"},{t:"CO out ~0.3%",c:"g"},{t:"Bypass LT at startup",c:"r"}],

{
  sec:"B",secLabel:"Reaction",secColor:"#1a3f7a",secBg:"#e8edf8",
  title:"CO₂ Removal (GV Section)",
  hook:"After the shift converters, we have a gas with ~15–18% CO₂ that must be removed to below 0.03% before reaching the synthesis loop. CO₂ is removed not because it is toxic to the plant — but because every molecule of CO₂ represents a hydrogen molecule that was consumed to make it, and also because it is a valuable raw material for the adjacent urea plant.",
  whyCards:[
    {c:"blue",icon:"🧪",label:"Why hot potassium carbonate",title:"Hot K₂CO₃ avoids the steam penalty of cold amine systems",body:"MEA (monoethanolamine) solvents absorb CO₂ well but require the solution to be cooled to absorb and then reheated to regenerate — a large steam penalty. Hot K₂CO₃ (Benfield/GV process) absorbs at 70–106°C AND regenerates at ~106°C — nearly isothermal. The steam saving is 30–40% vs amine systems."},
    {c:"green",icon:"⚡",label:"Why glycine activator is added",title:"Plain K₂CO₃ absorbs CO₂ too slowly for industrial use",body:"The reaction CO₂ + K₂CO₃ + H₂O → 2KHCO₃ is mass-transfer limited — CO₂ dissolves slowly into the carbonate solution. Glycine (an amino acid) acts as a CO₂ carrier: it reacts with CO₂ instantly to form a carbamate, then transfers CO₂ to carbonate in the bulk liquid. Rate increases 3–5×."},
    {c:"amber",icon:"⚙",label:"Why hydraulic turbine TX3301",title:"Pressure energy of rich solution is recovered as shaft work",body:"The rich K₂CO₃ solution leaves the absorber at ~28 kg/cm²g and is let down to 1.0 kg/cm²g for regeneration. Rather than wasting this pressure drop across a control valve, the hydraulic turbine converts it to shaft work — directly driving the semilean solution pump P3301. Net electrical saving: ~200–300 kW."},
    {c:"purple",icon:"🏭",label:"Why CO₂ is exported to urea plant",title:"CO₂ from this process is the feedstock for adjacent urea unit",body:"Urea (NH₂CONH₂) synthesis requires exactly 1 mole of CO₂ per 2 moles of NH₃. The CO₂ recovered here is at exactly the right purity (>99%), temperature, and location. The K3301 blower compresses it to the urea synthesis pressure. Rather than being a waste product, this CO₂ stream generates significant revenue."}
  ],
  logic:[
    {n:"1",title:"Two-stage absorption (semilean lower, lean upper)",desc:"Why? Semilean solution (partially regenerated) handles the bulk CO₂ load efficiently in the lower beds — it still has absorbing capacity and the hot temperature drives fast kinetics. Fully lean solution (deeply regenerated) is used only in the upper beds for final polishing to <0.03% — using lean solution throughout would require enormous regeneration energy.",consequence:"Single-stage lean only = 40% more steam in reboiler + larger regenerators"},
    {n:"2",title:"HP regenerator F3301 at 1.0 kg/cm²g, LP at 0.1 kg/cm²g",desc:"Why two regenerators at different pressures? The HP regen strips the bulk CO₂ and produces semilean solution. The LP regen strips more deeply using the flash vapour from pressure letdown — producing the fully lean solution for the absorber upper stage. This two-pressure design reduces regeneration steam by ~20% vs single-stage.",consequence:"Single-stage regeneration = higher steam consumption = larger boiler needed"},
    {n:"3",title:"Vanadium oxide corrosion inhibitor in solution",desc:"Why? Hot potassium carbonate solution at 106°C is moderately corrosive to carbon steel. Vanadium pentoxide (V₂O₅) forms a protective passivating layer on steel surfaces. Without it, the absorber and regenerator internals would corrode and need replacement every 2–3 years.",consequence:"No V₂O₅ = accelerated corrosion of vessels = unplanned shutdowns for repairs"},
    {n:"4",title:"CO₂ slip target is <0.03% (not lower)",desc:"Why not target 0.01%? Because the methanator downstream can handle 0.03% CO₂ and convert it to methane without temperature excursion. Targeting lower CO₂ slip would require more lean solution (more regeneration steam), deeper regeneration, and more trays — all costs that outweigh the marginal benefit.",consequence:"Target too tight = unnecessary regeneration energy + operating cost"}
  ],
  equipment:[
    {tag:"F3303",name:"CO₂ Absorber",why:"A packed tower with 5 SS random packing beds is chosen over trays because the K₂CO₃/glycine solution is foaming-sensitive. Random packing has a larger liquid-gas contact area and lower pressure drop than trays, and tolerates foaming far better. Stainless steel packing resists the slightly corrosive hot carbonate solution.",altWhy:"Without F3303, CO₂ (15–18%) would reach the methanator. At 15% × 60°C/mol% = +900°C temperature rise — the methanator would be instantly destroyed at >1000°C. CO₂ removal is non-negotiable."},
    {tag:"F3301/F3302",name:"HP + LP Regenerators",why:"Two-tower regeneration at different pressures achieves deeper solution regeneration than a single tower while using less steam. The LP tower uses the flash energy from pressure letdown (essentially free energy from the solution's own pressure) rather than requiring externally supplied steam for regeneration.",altWhy:"Without regeneration towers, the K₂CO₃ solution would quickly become fully converted to KHCO₃ and lose its absorbing capacity. Continuous regeneration is what makes the K₂CO₃ process work as a cycle rather than a batch process."}
  ],
  consequence:"Without CO₂ removal, the methanator (designed for <0.03% CO₂) would receive 15–18% CO₂ and the temperature rise would be 15 × 60°C/mol% = +900°C — instantly incinerating the catalyst. CO₂ must be removed before methanation. Additionally, CO₂ in the synthesis loop causes the Boudouard reaction, deposits ammonium carbamate, and permanently poisons the KMIR catalyst.",
  specs:[{v:"30",u:"wt%",l:"K₂CO₃ concentration"},{v:"5",u:"beds",l:"F3303 SS packing"},{v:"1.0/0.1",u:"kg/cm²g",l:"HP/LP regen"},{v:"<0.03",u:"%",l:"CO₂ at outlet"},{v:"41.5",u:"kNm³/h",l:"CO₂ to urea"},{v:"TX3301",u:"",l:"Hydraulic turbine"}],
  conds:[{t:"K₂CO₃/Glycine/DEA",c:"b"},{t:"CO₂ out <0.03%",c:"g"},{t:"HP regen 1.0 bar",c:"n"},{t:"LP regen 0.1 bar",c:"n"},{t:"V₂O₅ corrosion inh.",c:"a"},{t:"→ Urea plant",c:"g"}],
  ifNot:["15% CO₂ to methanator → +900°C excursion → catalyst destroyed instantly","CO₂ in synthesis loop → ammonium carbamate deposits → plugging","CO₂ to KMIR catalyst → iron oxidation → permanent catalyst deactivation"],

  sec:"B",secLabel:"Reaction",secColor:"#1a3f7a",secBg:"#e8edf8",
  title:"Methanation",
  hook:"The CO₂ absorber reduces CO₂ to about 300 ppm — but even 10 ppm of CO or CO₂ in the synthesis loop will irreversibly deactivate the KMIR iron catalyst over time. The methanator converts these trace oxides to methane, which is catalytically harmless. It is the last guardian before the synthesis loop.",
  whyCards:[
    {c:"red",icon:"⚠",label:"Why even 10 ppm CO/CO₂ matters",title:"Oxygen compounds permanently oxidise the KMIR catalyst",body:"The ammonia synthesis catalyst works because iron is in the active metallic Fe° state. CO and CO₂ react with Fe° to form Fe₂O₃ (rust), permanently deactivating those sites. Even at 10 ppm, continuous exposure over months causes measurable activity loss. A fresh KMIR charge costs millions — protecting it is paramount."},
    {c:"green",icon:"♻",label:"Why convert CO/CO₂ to CH₄ specifically",title:"Methane is the only harmless inert option",body:"The methanation reaction produces methane + water. The water condenses and is separated in B3311. Methane is inert in the synthesis loop — it cannot react and simply recycles until purged. It does not poison the KMIR catalyst, does not shift equilibrium, and is ultimately recovered as fuel gas via the purge gas absorber."},
    {c:"blue",icon:"🌡",label:"Why the 420°C temperature limit is hard",title:"Nickel crystallites sinter above 420°C, losing surface area",body:"PK-5 catalyst consists of tiny nickel crystallites (~5 nm) dispersed on an alumina support. Above 420°C, these crystallites begin to coalesce (sinter) into larger particles with less surface area. Every 10°C above 420°C roughly halves the remaining catalyst life. The limit is structural, not just operational preference."},
    {c:"amber",icon:"📈",label:"Why temperature rise is a diagnostic tool",title:"The ΔT directly measures carbon oxide concentration",body:"Each mol% of CO raises the bed temperature by ~75°C; each mol% CO₂ by ~60°C. In normal operation (CO+CO₂ <0.03%), the ΔT is only 18–19°C. If the GV section malfunctions and CO₂ breakthrough rises to 1%, the methanator ΔT suddenly jumps to ~80°C — an immediate visible alarm."}
  ],
  logic:[
    {n:"1",title:"Two catalyst beds (not one) are installed",desc:"Why? Insurance against partial deactivation. When the upper bed loses some activity (from small CO₂ excursions over time), the lower bed provides backup conversion. Only the upper bed is loaded initially — the lower bed space is reserved for the future when upper bed activity declines.",consequence:"Single bed = no backup → CO/CO₂ slip to synthesis if bed partially deactivates"},
    {n:"2",title:"Feed is preheated to 290–320°C (not lower)",desc:"Why? Below 280°C, the thermodynamic equilibrium for methanation still favours CH₄, but the reaction rate on PK-5 becomes too slow to achieve the required conversion (<10 ppm) within the available catalyst volume. 290–320°C ensures fast kinetics at thermodynamically favourable conditions.",consequence:"T < 280°C = incomplete conversion → CO/CO₂ slip → synthesis catalyst damage"},
    {n:"3",title:"Steam must never be used for heating/cooling/purging",desc:"Why? Steam without hydrogen in the gas phase oxidises the metallic Ni catalyst back to NiO (nickel oxide), which is inactive. Once oxidised this way, the catalyst requires careful re-reduction with H₂ — requiring a specific startup procedure and often causing uneven activity recovery.",consequence:"Steam purge of methanator = catalyst oxidation = lengthy re-reduction startup needed"},
    {n:"4",title:"Gas cooled to 38°C in E3312 before B3311 separator",desc:"Why? The methanation reactions produce water (one of their products). At 92°C after E3311, the gas is still saturated with steam. Cooling to 38°C in the final cooler E3312 condenses virtually all water vapour — dried gas is essential because water vapour entering the synthesis loop would deactivate the KMIR catalyst.",consequence:"Wet gas to synthesis loop = water deactivates KMIR catalyst over time"}
  ],
  equipment:[
    {tag:"R3311",name:"Methanator",why:"The vessel geometry (two beds with space for catalyst addition) and the PK-5 Ni catalyst were specifically chosen for this low-CO₂ service. The PK-5 formulation (~27% Ni) gives high activity at the low CO/CO₂ concentrations present after the GV section. Alternative catalysts with less Ni would require a larger vessel to achieve the same <10 ppm outlet.",altWhy:"Without R3311, CO (~50 ppm) and CO₂ (~300 ppm) would enter the synthesis loop continuously. Within 6–12 months of steady operation, the KMIR catalyst would lose 20–30% of its activity, requiring an early (expensive, unplanned) catalyst change."},
    {tag:"E3311",name:"Feed/Effluent gas-gas HX",why:"The methanator outlet is at ~339°C (too hot to cool directly in a water cooler without waste). E3311 is a gas-gas heat exchanger that uses the hot outlet to preheat the cool inlet feed — recovering heat internally and reducing the load on the downstream water cooler E3312. Net effect: less cooling water needed AND lower overall heat loss.",altWhy:"Without E3311, the full 339°C outlet enthalpy would have to be rejected in the water cooler — a significant thermal waste that also requires a larger E3312."}
  ],
  consequence:"The methanator is the final chemical purification step before synthesis. Its failure or underperformance means carbon oxides reach the KMIR catalyst — the most expensive and longest-lead item in the plant. An average KMIR catalyst change takes 2–3 weeks and costs $2–4 million. Protecting it by maintaining the methanator is a non-negotiable economic decision.",
  specs:[{v:"60",u:"m³",l:"PK-5 Ni catalyst"},{v:"290–320",u:"°C",l:"Normal inlet T"},{v:"≤420",u:"°C",l:"Max safe temp"},{v:"<10",u:"ppm",l:"CO+CO₂ outlet"},{v:"75/60",u:"°C/mol%",l:"ΔT per CO/CO₂%"},{v:"18–19",u:"°C",l:"Normal ΔT"}],
  conds:[{t:"PK-5 Ni ~27%",c:"n"},{t:"290–320°C inlet",c:"a"},{t:"Max 420°C",c:"r"},{t:"CO+CO₂ < 10 ppm",c:"g"},{t:"No steam purge!",c:"r"},{t:"Dry gas to B3311",c:"b"}],

{
  sec:"C",secLabel:"Synthesis & Separation",secColor:"#7a1a1a",secBg:"#fde8e8",
  title:"Ammonia Synthesis",
  hook:"This is the step that the entire plant exists to perform. Everything upstream was preparation — removing poisons, building the right gas composition, achieving the right pressure. Now 3 moles of hydrogen and 1 mole of nitrogen are forced together on an iron catalyst at 220 kg/cm²g. But only 30% reacts per pass — so everything is recycled and tried again and again.",
  whyCards:[
    {c:"red",icon:"💎",label:"Why 220 kg/cm²g (so high)",title:"Higher pressure = higher ammonia concentration at equilibrium",body:"Le Chatelier: 4 moles of gas → 2 moles of product. Higher pressure favours the product side. At 1 atm, equilibrium ammonia is <1%. At 220 kg/cm²g, it reaches 15–18% per pass. The tradeoff: compressor cost, vessel wall thickness, safety complexity. 220 kg/cm²g is the engineering optimum for modern plants."},
    {c:"amber",icon:"⚖",label:"Why only ~30% converts per pass",title:"Equilibrium and catalyst activity set an upper limit at operating T",body:"The catalyst must operate above 360°C to be active, but at 360°C+ the equilibrium ammonia is only 15–18%. The 30% per-pass figure reflects approaching this equilibrium. To get more conversion per pass would require either lower temperature (inactive catalyst) or impractically high pressure. Recycling unconverted gas is the practical solution."},
    {c:"blue",icon:"🔄",label:"Why radial flow design",title:"Small catalyst particles require radial flow to avoid high ΔP",body:"KMIR catalyst uses 1.5–3 mm particles for maximum activity (more surface area per volume). In an axial flow design, gas would pass through several metres of small particles — the pressure drop would be enormous (hundreds of kg/cm²). Radial flow requires gas to travel only ~30 cm radially through the bed, making small particles practical."},
    {c:"green",icon:"❄",label:"Why cool to 12°C for separation",title:"Ammonia must be condensed from the gas phase to separate it",body:"At 12°C and 220 kg/cm²g, ammonia condenses to liquid while H₂ and N₂ remain gas. The liquid NH₃ drains to the separator B3501. The un-reacted H₂+N₂ gas recycles to the converter. This is the only practical way to separate ammonia from synthesis gas — distillation at synthesis pressure would be impractical."}
  ],
  logic:[
    {n:"1",title:"Minimum 360°C inlet temperature to 1st bed is maintained",desc:"Why? The KMIR iron catalyst has a minimum operating temperature. Below 360°C, the reaction rate is too slow to sustain the exothermic reaction — the catalyst bed cools further, the rate falls more, and the reaction 'extinguishes'. Once extinguished, the operator must gradually reheat with the startup heater H3501.",consequence:"Inlet <360°C = reaction extinguishment → requires startup heater intervention"},
    {n:"2",title:"Hot spot must never exceed 520°C",desc:"Why? Above 520°C, the KMIR iron crystallites sinter irreversibly. Potassium (K₂O) and alumina promoters that stabilise the iron surface begin to migrate and lose their effectiveness. Once sintered, activity loss is permanent — the catalyst lifespan drops from 5+ years to 2–3 years.",consequence:"Hot spot >520°C = irreversible catalyst sintering → reduced yield for remaining life"},
    {n:"3",title:"Cold shots are injected between 1st and 2nd bed",desc:"Why? The 1st bed exit gas is at ~500–510°C (the hot spot). If fed directly to the 2nd bed, the 2nd bed inlet would be too hot, pushing the hot spot in the 2nd bed above 520°C. Cold synthesis gas injected via the center tube quenches the inter-bed gas to ~370°C — the optimal 2nd bed inlet temperature.",consequence:"No cold shots = 2nd bed over-temperature = hot spot violation"},
    {n:"4",title:"Liquid ammonia is separated in B3501 at 12°C before recycling",desc:"Why? Ammonia left in the recycle gas would re-enter the converter at high concentration — shifting the equilibrium backward and reducing the driving force for new ammonia synthesis. Separating liquid NH₃ first drops the ammonia concentration in the recirculating gas, maintaining maximum conversion driving force.",consequence:"NH₃ not separated = high NH₃ in recycle → back-reaction → lower conversion"}
  ],
  equipment:[
    {tag:"R3501",name:"Ammonia Synthesis Converter",why:"The radial flow, two-bed design with inter-bed heat exchanger was chosen to: (1) use small catalyst particles for maximum activity without excessive ΔP, (2) use inter-bed cooling (cold shots) to optimise the temperature profile through both beds, and (3) integrate feed preheating in the inter-bed exchanger to recover heat from the 1st bed exit and bring the feed gas to reaction temperature.",altWhy:"Without R3501, there is simply no ammonia production — it is the defining piece of equipment. Every other step in the plant exists to prepare, purify, and compress synthesis gas so that this converter can produce ammonia efficiently and reliably."},
    {tag:"E3501 (Loop WHB)",name:"Loop waste heat boiler",why:"R3501 produces ~750 kcal per kg of ammonia as heat of reaction. At 100 TPD production, this is ~3.1 MW of thermal energy at 456°C. E3501 converts this to high-pressure steam — simultaneously cooling the converter effluent and generating a valuable utility product. Without this heat recovery, the heat would have to be rejected to cooling water at much lower value.",altWhy:"Without E3501, the 456°C converter effluent would have to be cooled by cooling water directly — wasting ~3 MW of high-grade thermal energy that could otherwise be generating HP steam. The loop WHB is central to the plant's energy efficiency."}
  ],
  consequence:"This step is the reason the entire plant exists. Any serious failure — catalyst poisoning, temperature excursion, compressor trip — stops ammonia production immediately. The KMIR catalyst, at $2–4 million per charge, must be protected above all other considerations. Operating the converter at the lowest possible temperature consistent with sufficient activity is the primary operating principle.",
  specs:[{v:"109.3",u:"m³",l:"KMIR catalyst total"},{v:"1.5–3",u:"mm",l:"Particle size"},{v:"220/245",u:"kg/cm²g",l:"Normal/max P"},{v:"≤520",u:"°C",l:"Hot spot limit"},{v:"~30",u:"%",l:"Per-pass conversion"},{v:">5",u:"years",l:"Catalyst lifetime"}],

{
  sec:"C",secLabel:"Synthesis & Separation",secColor:"#7a1a1a",secBg:"#fde8e8",
  title:"Purge, Wash & Distillation",
  hook:"The synthesis loop constantly accumulates argon and methane that cannot react. Without continuous purging, these inerts would crowd out the synthesis gas and ammonia production would fall to near zero. But the purge gas also contains valuable ammonia and hydrogen — every molecule is recovered.",
  whyCards:[
    {c:"red",icon:"🔄",label:"Why purge the loop at all",title:"Ar and CH₄ have nowhere to go — they accumulate forever",body:"Argon (from process air) and methane (from make-up syngas) are completely inert in the synthesis loop. They enter with every fresh charge of gas, never react, and just recirculate. Without a continuous purge, they would reach 80–90% of the loop gas within days, making the H₂ and N₂ partial pressures (and therefore ammonia production) negligible."},
    {c:"amber",icon:"⚖",label:"Why the purge rate is a balance",title:"Purge too much = lose valuable H₂; too little = inert buildup",body:"Purge gas is ~60% H₂ — expensive synthesis gas that took energy to produce and compress. Purging too aggressively wastes hydrogen. Purging too little lets inerts build up, reducing conversion. The target inert level (typically 10–15% Ar+CH₄) is set by the economic balance between H₂ loss cost vs. compression energy wasted on recycling inerts."},
    {c:"blue",icon:"❄",label:"Why chill purge gas to –25°C before absorber",title:"Condensing ammonia reduces the NH₃ load on water absorbers",body:"Purge gas leaving the separator still contains 10–20% ammonia vapour. Chilling to –25°C in E3511 condenses a large portion of this ammonia back to liquid (returned directly to B3501 — free recovery with no energy cost). Only the uncondensed ammonia goes to the water absorbers, which operate at higher pressure and cost."},
    {c:"green",icon:"🔥",label:"Why the vent gas is used as fuel",title:"H₂ and CH₄ have high calorific value — too valuable to flare",body:"After washing out ammonia, the absorber overhead gas contains ~50% H₂ and ~30% CH₄ — a high-quality fuel gas. Routing it to the primary reformer burners recovers its calorific value, reducing external gas consumption by 5–10%. In energy-cost terms, this stream is worth hundreds of thousands of dollars per year."}
  ],
  logic:[
    {n:"1",title:"Purge gas is taken after E3506 (1st ammonia chiller), not before",desc:"Why? At the E3506 exit (18.8°C), the ammonia partial pressure is lower than at the converter exit — less ammonia is lost in the purge. Taking purge earlier (at higher temperature) would waste more ammonia per unit of inert removed.",consequence:"Purge taken too early (hot) = more NH₃ lost per m³ purged = higher NH₃ recovery duty"},
    {n:"2",title:"Two separate absorbers at different pressures (F3522 at 15 bar, F3523 at 81 bar)",desc:"Why different pressures? Purge gas from the loop is at ~15 kg/cm²g. Letdown gas from B3502 is compressed back to 81 kg/cm²g so it can join the off-gas absorber at that pressure. Separate absorbers at matching pressures avoid the cost and energy of compressing the purge gas to 81 kg/cm²g.",consequence:"Single absorber = either compress purge gas (energy cost) or reduce letdown gas (pressure loss)"},
    {n:"3",title:"NH₃-water solution distilled at 25 kg/cm²g (not atmospheric)",title:"Overhead NH₃ at 25 bar is condensable by cooling water",desc:"Why? At atmospheric pressure, ammonia boils at –33°C — the condenser would require a refrigerant circuit. At 25 kg/cm²g, ammonia condenses at ~60°C — ordinary cooling water works. This eliminates an entire refrigeration train for the distillation overhead condenser, a major capital and energy saving.",consequence:"Distillation at atmospheric = refrigerant condenser needed = large additional energy consumption"},
    {n:"4",title:"Lean solution is returned to absorbers at 43°C (not hotter)",desc:"Why 43°C specifically? This temperature is chosen to balance two competing needs: (1) low enough temperature to keep the ammonia vapour pressure of the lean solution low (improving absorption driving force), (2) warm enough that the lean solution has good flow properties and doesn't require expensive cooling below ambient.",consequence:"Lean solution too hot = poor NH₃ absorption → NH₃ in vent gas above spec"}
  ],
  equipment:[
    {tag:"F3522/F3523",name:"Ammonia wash absorbers",why:"Water absorbers are chosen because water is cheap, readily available, non-toxic, and has excellent capacity for ammonia (unlike physical solvents). The counter-current water-gas contact in tray/packed columns achieves very low NH₃ in the outlet gas (<0.01–0.02 mol%) economically. The outlet ammonia water is then concentrated and distilled to recover pure NH₃.",altWhy:"Without the wash absorbers, the purge and vent gases (containing 5–15% NH₃) would have to be flared or vented — an enormous environmental and economic loss. At 100 TPD plant scale, the NH₃ in purge/vent without recovery could be 5–10 TPD — ~5–10% of production simply wasted."},

  title:"Process Condensate Stripping",
  hook:"Water collected throughout the process is not clean — it contains dissolved ammonia, CO₂, and methanol that would destroy the demineraliser resin beds and cost thousands of dollars per day in chemical regenerants. Stripping removes all contaminants and turns this waste water into recyclable process steam — zero discharge, zero waste.",

    {c:"green",icon:"💧",label:"Why stripped condensate goes to demineralisation",title:"Process condensate is the cleanest large water source in the plant",body:"Steam condensate is inherently low-mineral content (it was distilled from demin water). After stripping removes the dissolved gases and methanol, it is nearly pure water. Returning it to the demin plant (rather than draining to sewer) reduces raw water consumption, reduces demineraliser chemical usage, and reduces liquid effluent treatment costs."},
    {c:"amber",icon:"⚠",label:"Why methanol must be removed",title:"Methanol passes through demineraliser resins unretained — and degrades them",body:"Ion exchange resins in the demineraliser are designed to remove ionic species (Ca²⁺, Mg²⁺, Cl⁻, SO₄²⁻ etc.). Methanol is a neutral organic molecule — it passes straight through the resin beds and into the boiler feed water. In the boiler, methanol decomposes at high temperature to CO and CH₄, which cause boiler tube corrosion and potentially CO carryover into steam lines."},
    {c:"red",icon:"🚨",label:"Why B3202 separator is essential",title:"Condensate carryover into the prereformer destroys catalyst",body:"If liquid water droplets were carried over with the overhead steam into R3206 or H3201, they would flash to steam on contact with hot catalyst (>490°C). This flash creates an intense thermal shock that physically shatters catalyst pellets and can cause the catalyst tube to hydraulically lock — requiring emergency shutdown and catalyst replacement."}
  ],
  logic:[
    {n:"1",title:"Stripper operates at 38 kg/cm²g (not atmospheric)",desc:"Why? At higher pressure, the boiling point of ammonia in solution is higher — but more importantly, the overhead steam from the stripper is at high enough pressure to be used directly as process steam in the reforming section without recompression. Atmospheric operation would produce low-pressure steam useless for this purpose.",consequence:"Atmospheric operation = overhead steam at 1 bar = unusable as process steam = separate steam supply needed"},
    {n:"2",title:"Steam stripping used (not reboiler distillation)",desc:"Why? Direct steam injection (live steam at the bottom) is the simplest and most reliable way to strip volatile components from a dilute aqueous stream. It simultaneously provides the stripping vapour and the heating medium. A reboiler design would be much more expensive and complex for what is essentially a waste water treatment step.",consequence:"No stripping = contaminants reach demin resin beds = accelerated degradation = high chemical cost"},
    {n:"3",title:"Condensate cooled to 45°C before demin plant",desc:"Why? Demineraliser ion exchange resins have a maximum operating temperature of approximately 50°C. At higher temperatures the resin matrix degrades, reducing capacity and shortening resin life. Cooling to 45°C provides a comfortable margin below the resin temperature limit.",consequence:"Condensate too hot to demin = resin degradation = loss of exchange capacity = more frequent replacement"},
    {n:"4",title:"B3202 separator located at F3321 overhead outlet",desc:"Why? Even well-designed strippers can produce fine mist or spray at the overhead outlet — especially at startup or during upsets when the feed rate changes suddenly. The knockout drum B3202 provides a final liquid-gas separation upstream of the reformer, ensuring only dry steam enters the high-temperature catalyst zones.",consequence:"No B3202 = condensate slugs enter prereformer/reformer = catalyst shattering = unplanned shutdown"}
  ],
  equipment:[
    {tag:"F3321",name:"Process Condensate Stripper",why:"A simple stripping column design — no reboiler, just direct steam injection — is chosen for this service because the feed is dilute (~2–5% contaminants in water) and the required separation is straightforward (remove volatiles from water). The 38 kg/cm²g operating pressure produces overhead steam directly usable in the process without recompression.",altWhy:"Without F3321, all process condensate would have to be treated as chemical waste water — requiring a separate waste water treatment plant, generating liquid effluent for disposal, and losing thousands of tonnes of near-pure water per year that currently returns as boiler feed water."},
    {tag:"B3202",name:"Overhead separator",why:"This vessel protects the entire reforming section from liquid water ingestion. It is a simple knock-out drum but its location at the critical interface between the waste water treatment step and the high-temperature reformer section makes it a safety-critical item. A small vessel with enormous consequence if it were absent.",altWhy:"A single episode of liquid water reaching hot R3206 or H3201 catalyst could destroy several tonnes of catalyst pellets through thermal shock fracture — a weeks-long repair requiring complete tube bundle unloading, catalyst replacement, and tube inspection."}

let cur=0;

function pillNav(){
  const nav=document.getElementById('pnav');
  nav.innerHTML=S.map((s,i)=>{
    const cls=i<cur?'done':i===cur?'active':'';
    const short=s.title.split(' ').slice(0,2).join(' ');
    return`<button class="pill ${cls}" onclick="jump(${i})"><span class="pill-num">${i<cur?'✓':i+1}</span>${short}</button>`;
  }).join('');
  nav.querySelectorAll('.pill')[cur]?.scrollIntoView({inline:'nearest',block:'nearest'});
}

function wCard(w){
  return`<div class="why-card ${w.c}">
    <span class="why-card-icon" style="font-size:18px">${w.icon}</span>
    <div class="why-card-label">${w.label}</div>
    <div class="why-card-title">${w.title}</div>
    <div class="why-card-body">${w.body}</div>
  </div>`;
}

function logicStep(l){
  return`<div class="logic-step">
    <div class="logic-num">${l.n}</div>
    <div class="logic-content">
      <div class="logic-title">${l.title}</div>
      <div class="logic-desc">${l.desc}</div>
      <span class="logic-consequence">If not: ${l.consequence}</span>
    </div>
  </div>`;
}

function render(){
  const s=S[cur];
  const pct=Math.round(((cur+1)/S.length)*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=`${cur+1}/${S.length}`;

  document.getElementById('main').innerHTML=`<div class="animate">
    <div class="step-eyebrow">
      <span class="section-chip" style="background:${s.secBg};color:${s.secColor}">${s.sec} · ${s.secLabel}</span>
      <span class="step-counter">Step ${cur+1} of ${S.length}</span>
    </div>
    <h1 class="step-title">${s.title}</h1>
    <p class="step-hook">${s.hook}</p>

    <div class="diagram-wrap">
      <svg viewBox="0 0 680 ${s.svgH}" xmlns="http://www.w3.org/2000/svg">${s.svg}</svg>
    </div>

    <div class="section-label">Why this step exists</div>
    <div class="why-grid">${s.whyCards.map(wCard).join('')}</div>

    <div class="section-label">Why each decision in this step</div>
    <div class="logic-chain">${s.logic.map(logicStep).join('')}</div>

    <div class="section-label">Why this equipment was chosen</div>
    <div class="equip-rationale">${s.equipment.map(e=>`
      <div class="equip-row">
        <div class="equip-header">
          <div class="equip-tag-big">${e.tag}</div>
          <div class="equip-name">${e.name}</div>
        </div>
        <div class="equip-body">
          <div>
            <div class="equip-section-title">Why this equipment here</div>
            <div class="equip-text">${e.why}</div>
          </div>
          <div>
            <div class="equip-section-title">What happens if it is absent</div>
            <div class="equip-text">${e.altWhy}</div>
          </div>
        </div>
      </div>`).join('')}
    </div>

    <div class="consequence-box">
      <div class="cb-title">Overall consequence of skipping this step</div>
      <div class="cb-body">${s.consequence}</div>
    </div>
  </div>`;

  document.getElementById('sb').innerHTML=`<div class="animate">
    <div class="sidebar-section">
      <div class="sb-heading">Operating conditions</div>
      <div class="cond-list">${s.conds.map(c=>`<span class="cond cond-${c.c}">${c.t}</span>`).join('')}</div>
    </div>
    <div class="sidebar-section">
      <div class="sb-heading">Design specifications</div>
      <div class="spec-grid">${s.specs.map(sp=>`
        <div class="spec-card">
          <div class="spec-val">${sp.v} <span class="spec-unit">${sp.u}</span></div>
          <div class="spec-lbl">${sp.l}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sb-heading">If this step fails or is skipped</div>
      <div class="if-not">${s.ifNot.map(i=>`<div class="if-not-item">${i}</div>`).join('')}</div>
    </div>
  </div>`;

  document.getElementById('navStep').textContent=`Step ${cur+1} of ${S.length}  ·  ${pct}% complete`;
  const nxt=S[Math.min(cur+1,S.length-1)];
  document.getElementById('navNext').textContent=cur<S.length-1?`Next: ${nxt.title}`:'Process complete ✓';
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').textContent=cur===S.length-1?'Complete ✓':'Next →';
  document.getElementById('nextBtn').disabled=false;
  pillNav();
}

function go(d){cur=Math.max(0,Math.min(S.length-1,cur+d));render();window.scrollTo({top:0,behavior:'smooth'});}
function jump(i){cur=i;render();window.scrollTo({top:0,behavior:'smooth'});}
render();
</script>
